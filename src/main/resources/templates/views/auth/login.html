<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Voluntariado</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/notifications.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-background">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <img th:src="@{/img/logo.png}" alt="Logo Voluntariado">
                </div>
                <h1 class="login-title">Bienvenido</h1>
                <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

                <!-- Error de login -->
                <div class="alert-error" th:if="${param.error}" style="opacity:1;">
                    <span>Usuario o contraseña incorrectos</span>
                </div>
                <!-- Logout exitoso -->
                <div class="alert-error" th:if="${param.logout}"
                     style="opacity:1; border-color:#28a745; background-color:#d4edda; color:#155724;">
                    <span>Sesión cerrada correctamente</span>
                </div>

                <form th:action="@{/doLogin}" method="post" class="login-form">
                    <div class="form-group">
                        <label for="usuario">Usuario</label>
                        <input type="text" id="usuario" name="usuario" placeholder="Tu usuario" required autofocus>
                    </div>

                    <div class="form-group">
                        <label for="clave">Contraseña</label>
                        <input type="password" id="clave" name="clave" placeholder="Tu contraseña" required>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">Recordarme
                            <input type="checkbox" name="remember">
                            <span class="checkmark"></span>
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">Iniciar Sesión</button>
                </form>

                <div class="login-footer">
                    <p>¿No tienes una cuenta? <a href="#">Contáctanos</a></p>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/notifications.js}"></script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
